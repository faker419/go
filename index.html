<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>AR Marker Test</title>
  <style>
    body { margin: 0; overflow: hidden; }
    canvas { display: block; }
  </style>

  <!-- A-Frame 1.3.0 -->
  <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>

  <!-- AR.js 3.4.5 -->
  <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@3.4.5/aframe/build/aframe-ar.js"></script>
</head>
<body>
  <a-scene embedded vr-mode-ui="enabled: false;" arjs="debugUIEnabled: false;">
    <a-marker preset="kanji">
      <a-entity
        gltf-model="url(model-v2.glb)"
        scale="1 1 1"
        position="0 0 0"
        rotation="0 0 0"
        animation-mixer>
      </a-entity>
    </a-marker>
    <a-entity camera></a-entity>
  </a-scene>

  <script>
    AFRAME.registerComponent('animation-mixer', {
      init: function() {
        this.mixer = null;
        this.actions = [];

        this.el.addEventListener('model-loaded', (e) => {
          const model = this.el.getObject3D('mesh');
          if (!model) {
            console.warn('Model loaded but no mesh object');
            return;
          }

          if (model.animations && model.animations.length > 0) {
            console.log('Playing ' + model.animations.length + ' animation(s)');
            this.mixer = new THREE.AnimationMixer(model);
            model.animations.forEach(clip => {
              const action = this.mixer.clipAction(clip);
              action.play();
              this.actions.push(action);
            });
          } else {
            console.log('Model has no animations');
          }
        });
      },

      tick: function(time) {
        if (this.mixer) {
          this.mixer.update(time / 1000);
        }
      }
    });
  </script>
</body>
</html>
